name: Deploy Backend to Staging

on:
  push:
    branches:
      - dev 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Log in to your Docker Hub Account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build the Docker image from your root Dockerfile and push it
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: naimaomo/trovr-backend:latest 

      # 3. Connect to Azure VM via SSH and update the running container
      - name: SSH into Azure VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/trovr-deployment
            
            # Pull the brand new backend image pushed above
            sudo docker-compose pull backend
            
            # Restart ONLY the backend container dynamically
            # --no-deps keeps your running frontend, Nginx, and Postgres online untouched!
            sudo docker-compose up -d --no-deps backend
